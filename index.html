<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <!-- iPadでアプリっぽく開く設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="みるみる">
  <meta name="mobile-web-app-capable" content="yes">

  <title>みるみる</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #fff7dc;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }

    #game {
      position: relative;
      width: min(98vw, calc(98vh * 4 / 3), 1300px);
      aspect-ratio: 4 / 3;
      background: #fffdf2;
      border: 10px solid #ffd166;
      border-radius: 34px;
      box-shadow: 0 9px 0 rgba(0,0,0,0.15);
      overflow: hidden;
    }

    #resultMark {
      position: absolute;
      left: 50%;
      top: 30%;
      transform: translate(-50%, -50%);
      font-size: clamp(230px, 34vw, 500px);
      line-height: 1;
      z-index: 30;
      display: none;
      pointer-events: none;
      text-shadow: 0 9px 0 rgba(0,0,0,0.14);
    }

    #resultMark.show {
      display: block;
    }

    #target {
      position: absolute;
      left: 50%;
      top: 16%;
      transform: translate(-50%, -50%);
      width: clamp(100px, 12vw, 175px);
      height: clamp(100px, 12vw, 175px);
      border-radius: 50%;
      background: #ffef99;
      border: 5px solid #f4a261;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(64px, 8.5vw, 124px);
      box-shadow: 0 8px 0 rgba(0,0,0,0.18);
      z-index: 5;
      cursor: pointer;
      transition: left 0.22s linear, top 0.22s linear, opacity 0.2s;
      touch-action: manipulation;
    }

    #target:active {
      transform: translate(-50%, -46%);
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    }

    .obstacle {
      position: absolute;
      bottom: 6%;
      width: 25%;
      aspect-ratio: 1 / 1;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      padding: 0;
    }

    .obstacle:active {
      transform: translateY(5px);
    }

    #ob0 { left: 5%; }
    #ob1 { left: 37.5%; }
    #ob2 { left: 70%; }

    .shapeSvg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 10px 0 rgba(0,0,0,0.22));
    }

    .obstacle.removed {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
      transition: opacity 0.25s, transform 0.25s;
    }

    .obstacle.disabled {
      opacity: 0.95;
      pointer-events: none;
    }

    /* 正解後だけ有効になる、右上の見えないリセットエリア */
    #resetHotspot {
      position: fixed;
      right: 0;
      top: 0;
      width: 180px;
      height: 180px;
      border: 0;
      background: transparent;
      display: none;
      z-index: 100;
      touch-action: manipulation;
    }

    #resetHotspot.active {
      display: block;
    }
  </style>
</head>

<body>
  <main id="game">
    <div id="resultMark">⭕️</div>

    <div id="target" aria-label="ひよこ">🐥</div>

    <button class="obstacle disabled" id="ob0" onclick="openObstacle(0)" aria-label="あか">
      <svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="38" fill="#e53935" stroke="#000" stroke-width="6"></circle>
      </svg>
    </button>

    <button class="obstacle disabled" id="ob1" onclick="openObstacle(1)" aria-label="きいろ">
      <svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true">
        <rect x="14" y="14" width="72" height="72" rx="8" fill="#ffd600" stroke="#000" stroke-width="6"></rect>
      </svg>
    </button>

    <button class="obstacle disabled" id="ob2" onclick="openObstacle(2)" aria-label="あお">
      <svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="50,12 88,84 12,84" fill="#1e88e5" stroke="#000" stroke-width="6" stroke-linejoin="round"></polygon>
      </svg>
    </button>
  </main>

  <!-- 正解後だけ有効になる、見えないリセットボタン -->
  <button id="resetHotspot" onclick="resetGame()" aria-label="もういっかい"></button>

  <script>
    const target = document.getElementById("target");
    const game = document.getElementById("game");
    const resultMark = document.getElementById("resultMark");
    const resetHotspot = document.getElementById("resetHotspot");

    const obstacles = [
      document.getElementById("ob0"),
      document.getElementById("ob1"),
      document.getElementById("ob2")
    ];

    let hiddenIndex = null;
    let isMoving = false;
    let isHidden = false;
    let moveTimer = null;

    /* 音声ファイルなしで効果音を作る設定 */
    let audioCtx = null;

    function unlockAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playTone(frequency, duration, type = "sine", volume = 0.14) {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.value = frequency;

      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playStartSound() {
      // ピピッ
      playTone(880, 0.08, "sine", 0.12);

      setTimeout(() => {
        playTone(1100, 0.08, "sine", 0.12);
      }, 100);
    }

    function playCorrectSound() {
      // ピンポン
      playTone(880, 0.14, "sine", 0.15);

      setTimeout(() => {
        playTone(660, 0.22, "sine", 0.15);
      }, 150);
    }

    target.addEventListener("click", startGame);

    function startGame() {
      if (isMoving || isHidden) return;

      unlockAudio();
      playStartSound();

      resultMark.classList.remove("show");
      resetHotspot.classList.remove("active");
      resetObstaclesOnly();

      isMoving = true;
      isHidden = false;
      hiddenIndex = null;

      target.style.opacity = "1";
      target.style.pointerEvents = "none";

      obstacles.forEach(ob => ob.classList.add("disabled"));

      let count = 0;

      moveTimer = setInterval(() => {
        moveTargetRandomly();
        count++;

        if (count >= 12) {
          clearInterval(moveTimer);
          hideTarget();
        }
      }, 250);
    }

    function moveTargetRandomly() {
      const gameRect = game.getBoundingClientRect();
      const targetSize = target.offsetWidth;

      const minX = 18;
      const maxX = gameRect.width - 18;
      const minY = 80;
      const maxY = gameRect.height * 0.55;

      const x = random(minX + targetSize / 2, maxX - targetSize / 2);
      const y = random(minY, maxY);

      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    function hideTarget() {
      hiddenIndex = Math.floor(Math.random() * 3);
      const ob = obstacles[hiddenIndex];
      const obRect = ob.getBoundingClientRect();
      const gameRect = game.getBoundingClientRect();

      const centerX = obRect.left - gameRect.left + obRect.width / 2;
      const centerY = obRect.top - gameRect.top + obRect.height / 2;

      target.style.left = centerX + "px";
      target.style.top = centerY + "px";

      setTimeout(() => {
        target.style.opacity = "0";
        isMoving = false;
        isHidden = true;
        obstacles.forEach(ob => ob.classList.remove("disabled"));
      }, 250);
    }

    function openObstacle(index) {
      if (!isHidden || isMoving) return;

      unlockAudio();

      const ob = obstacles[index];
      const obRect = ob.getBoundingClientRect();
      const gameRect = game.getBoundingClientRect();

      const centerX = obRect.left - gameRect.left + obRect.width / 2;
      const centerY = obRect.top - gameRect.top + obRect.height / 2;

      obstacles[index].classList.add("removed");

      if (index === hiddenIndex) {
        target.style.left = centerX + "px";
        target.style.top = centerY + "px";
        target.style.opacity = "1";

        resultMark.classList.add("show");
        playCorrectSound();

        isHidden = false;
        target.style.pointerEvents = "auto";
        obstacles.forEach(ob => ob.classList.add("disabled"));

        resetHotspot.classList.add("active");
      }
    }

    function resetGame() {
      clearInterval(moveTimer);

      isMoving = false;
      isHidden = false;
      hiddenIndex = null;

      target.style.left = "50%";
      target.style.top = "16%";
      target.style.opacity = "1";
      target.style.pointerEvents = "auto";

      resetObstaclesOnly();

      resultMark.classList.remove("show");
      resetHotspot.classList.remove("active");
    }

    function resetObstaclesOnly() {
      obstacles.forEach(ob => {
        ob.classList.remove("removed");
        ob.classList.add("disabled");
      });
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    // ダブルタップズーム対策
    let lastTouchEnd = 0;
    document.addEventListener("touchend", function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    // iOS Safariのピンチ系ジェスチャー対策
    document.addEventListener("gesturestart", function(event) {
      event.preventDefault();
    });
  </script>
</body>
</html>
