<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">

  <!-- iPadでアプリっぽく開く設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="みるみる">
  <meta name="mobile-web-app-capable" content="yes">

  <title>みるみる</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #fff7dc;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 8px 12px 2px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(54px, 8.5vw, 104px);
      letter-spacing: 0.12em;
      line-height: 1.02;
    }

    #message {
      margin-top: 4px;
      min-height: 62px;
      font-size: clamp(36px, 5.4vw, 64px);
      font-weight: bold;
      color: #333;
      line-height: 1.1;
    }

    #message.correct {
      color: #e53935;
    }

    #game {
      position: relative;
      width: min(98vw, calc(78vh * 16 / 9), 1360px);
      aspect-ratio: 16 / 9;
      background: #fffdf2;
      border: 8px solid #ffd166;
      border-radius: 32px;
      box-shadow: 0 9px 0 rgba(0,0,0,0.15);
      overflow: hidden;
      margin-top: 2px;
    }

    #resultMark {
      position: absolute;
      left: 50%;
      top: 31%;
      transform: translate(-50%, -50%);
      font-size: clamp(220px, 32vw, 430px);
      line-height: 1;
      z-index: 30;
      display: none;
      pointer-events: none;
      text-shadow: 0 9px 0 rgba(0,0,0,0.14);
    }

    #resultMark.show {
      display: block;
    }

    #target {
      position: absolute;
      left: 50%;
      top: 16%;
      transform: translate(-50%, -50%);
      width: clamp(92px, 12vw, 160px);
      height: clamp(92px, 12vw, 160px);
      border-radius: 50%;
      background: #ffef99;
      border: 5px solid #f4a261;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(58px, 8.5vw, 112px);
      box-shadow: 0 8px 0 rgba(0,0,0,0.18);
      z-index: 5;
      cursor: pointer;
      transition: left 0.22s linear, top 0.22s linear, opacity 0.2s;
      touch-action: manipulation;
    }

    #target:active {
      transform: translate(-50%, -46%);
      box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    }

    .obstacle {
      position: absolute;
      bottom: 6%;
      width: 22%;
      aspect-ratio: 1 / 1;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      padding: 0;
    }

    .obstacle:active {
      transform: translateY(5px);
    }

    #ob0 { left: 8%; }
    #ob1 { left: 39%; }
    #ob2 { left: 70%; }

    .shapeSvg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 10px 0 rgba(0,0,0,0.22));
    }

    .obstacle.removed {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
      transition: opacity 0.25s, transform 0.25s;
    }

    .obstacle.disabled {
      opacity: 0.95;
      pointer-events: none;
    }

    #controls {
      width: min(98vw, 1360px);
      display: flex;
      justify-content: center;
      margin-top: 8px;
      min-height: 78px;
    }

    button.control {
      display: none;
      border: 0;
      border-radius: 22px;
      padding: 14px 52px;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: bold;
      background: #b7e4c7;
      color: #222;
      box-shadow: 0 6px 0 rgba(0,0,0,0.18);
      touch-action: manipulation;
    }

    button.control.show {
      display: block;
    }

    button.control:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.18);
    }
  </style>
</head>

<body>
  <header>
    <h1>みるみる</h1>
    <div id="message">ひよこをおしてね</div>
  </header>

  <main id="game">
    <div id="resultMark">⭕️</div>

    <div id="target" aria-label="ひよこ">🐥</div>

    <button class="obstacle disabled" id="ob0" onclick="openObstacle(0)" aria-label="あか">
      <svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="38" fill="#e53935" stroke="#000" stroke-width="6"></circle>
      </svg>
    </button>

    <button class="obstacle disabled" id="ob1" onclick="openObstacle(1)" aria-label="きいろ">
      <svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true">
        <rect x="14" y="14" width="72" height="72" rx="8" fill="#ffd600" stroke="#000" stroke-width="6"></rect>
      </svg>
    </button>

    <button class="obstacle disabled" id="ob2" onclick="openObstacle(2)" aria-label="あお">
      <svg class="shapeSvg" viewBox="0 0 100 100" aria-hidden="true">
        <polygon points="50,12 88,84 12,84" fill="#1e88e5" stroke="#000" stroke-width="6" stroke-linejoin="round"></polygon>
      </svg>
    </button>
  </main>

  <div id="controls">
    <button class="control" id="resetBtn" onclick="resetGame()">もういっかい</button>
  </div>

  <script>
    const target = document.getElementById("target");
    const game = document.getElementById("game");
    const message = document.getElementById("message");
    const resetBtn = document.getElementById("resetBtn");
    const resultMark = document.getElementById("resultMark");

    const obstacles = [
      document.getElementById("ob0"),
      document.getElementById("ob1"),
      document.getElementById("ob2")
    ];

    let hiddenIndex = null;
    let isMoving = false;
    let isHidden = false;
    let moveTimer = null;

    target.addEventListener("click", startGame);

    function startGame() {
      if (isMoving || isHidden) return;

      resetBtn.classList.remove("show");
      message.classList.remove("correct");
      resultMark.classList.remove("show");
      resetObstaclesOnly();

      isMoving = true;
      isHidden = false;
      hiddenIndex = null;

      target.style.opacity = "1";
      target.style.pointerEvents = "none";
      message.textContent = "よくみてね";

      obstacles.forEach(ob => ob.classList.add("disabled"));

      let count = 0;

      moveTimer = setInterval(() => {
        moveTargetRandomly();
        count++;

        if (count >= 12) {
          clearInterval(moveTimer);
          hideTarget();
        }
      }, 250);
    }

    function moveTargetRandomly() {
      const gameRect = game.getBoundingClientRect();
      const targetSize = target.offsetWidth;

      const minX = 16;
      const maxX = gameRect.width - 16;
      const minY = 70;
      const maxY = gameRect.height * 0.52;

      const x = random(minX + targetSize / 2, maxX - targetSize / 2);
      const y = random(minY, maxY);

      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    function hideTarget() {
      hiddenIndex = Math.floor(Math.random() * 3);
      const ob = obstacles[hiddenIndex];
      const obRect = ob.getBoundingClientRect();
      const gameRect = game.getBoundingClientRect();

      const centerX = obRect.left - gameRect.left + obRect.width / 2;
      const centerY = obRect.top - gameRect.top + obRect.height / 2;

      target.style.left = centerX + "px";
      target.style.top = centerY + "px";

      setTimeout(() => {
        target.style.opacity = "0";
        isMoving = false;
        isHidden = true;
        message.textContent = "どこかな？";
        obstacles.forEach(ob => ob.classList.remove("disabled"));
      }, 250);
    }

    function openObstacle(index) {
      if (!isHidden || isMoving) return;

      const ob = obstacles[index];
      const obRect = ob.getBoundingClientRect();
      const gameRect = game.getBoundingClientRect();

      const centerX = obRect.left - gameRect.left + obRect.width / 2;
      const centerY = obRect.top - gameRect.top + obRect.height / 2;

      obstacles[index].classList.add("removed");

      if (index === hiddenIndex) {
        target.style.left = centerX + "px";
        target.style.top = centerY + "px";
        target.style.opacity = "1";

        message.textContent = "せいかい！";
        message.classList.add("correct");
        resultMark.classList.add("show");

        isHidden = false;
        target.style.pointerEvents = "auto";
        obstacles.forEach(ob => ob.classList.add("disabled"));

        resetBtn.classList.add("show");
      } else {
        message.textContent = "いないよ";
      }
    }

    function resetGame() {
      clearInterval(moveTimer);

      isMoving = false;
      isHidden = false;
      hiddenIndex = null;

      target.style.left = "50%";
      target.style.top = "16%";
      target.style.opacity = "1";
      target.style.pointerEvents = "auto";

      resetObstaclesOnly();

      message.textContent = "ひよこをおしてね";
      message.classList.remove("correct");
      resultMark.classList.remove("show");
      resetBtn.classList.remove("show");
    }

    function resetObstaclesOnly() {
      obstacles.forEach(ob => {
        ob.classList.remove("removed");
        ob.classList.add("disabled");
      });
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    // ダブルタップズーム対策
    let lastTouchEnd = 0;
    document.addEventListener("touchend", function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    // iOS Safariのピンチ系ジェスチャー対策
    document.addEventListener("gesturestart", function(event) {
      event.preventDefault();
    });
  </script>
</body>
</html>
